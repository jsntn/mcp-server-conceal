# MCP Server Conceal - Configuration
#
# Detection modes:
#   "regex_ner" - Recommended. Regex + embedded BERT NER model (fast, accurate)
#   "regex_llm" - Regex + Ollama LLM (slower, legacy)
#   "regex"     - Regex only (fastest, structured PII only)
#   "llm"       - LLM only (slowest, legacy)

[detection]
mode = "regex_ner"    # regex, llm, regex_llm, or regex_ner (recommended)
enabled = true
confidence_threshold = 0.8

[detection.patterns]
email = "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
phone = "\\b(?:\\+?1[-\\.\\s]?)?(?:\\(?[0-9]{3}\\)?[-\\.\\s]?)?[0-9]{3}[-\\.\\s]?[0-9]{4}\\b"
ssn = "\\b\\d{3}-\\d{2}-\\d{4}\\b"
credit_card = "\\b\\d{4}[-\\s]?\\d{4}[-\\s]?\\d{4}[-\\s]?\\d{4}\\b"
ip_address = "\\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\b"

[faker]
locale = "en_US"
seed = 12345
consistency = true

[mapping]
database_path = "mappings.db"
encryption = false
retention_days = 90

# --- NER detection (recommended) ---
# Uses an embedded ONNX model via tract (pure Rust, no Python needed).
# Download model: curl -L -o model.onnx "https://huggingface.co/dslim/bert-base-NER/resolve/main/onnx/model.onnx"
# Download tokenizer: curl -L -o tokenizer.json "https://huggingface.co/dslim/bert-base-NER/resolve/main/onnx/tokenizer.json"
[ner]
model_path = "/home/YOUR_USER/.local/share/mcp-server-conceal/ner/model.onnx"
tokenizer_path = "/home/YOUR_USER/.local/share/mcp-server-conceal/ner/tokenizer.json"
labels = ["O", "B-MISC", "I-MISC", "B-PER", "I-PER", "B-ORG", "I-ORG", "B-LOC", "I-LOC"]

# --- LLM detection (legacy) ---
# Requires Ollama running locally: ollama pull qwen2.5:1.5b-instruct-q4_K_M
[llm]
enabled = true
model = "qwen2.5:1.5b-instruct-q4_K_M"
endpoint = "http://localhost:11434"
timeout_seconds = 60
# Prompt template selection:
#   "simple"   - lightweight, works with 1.5B+ models (default if omitted)
#   "detailed" - comprehensive with hostname/node detection, requires 3B+ models
#   "<name>"   - custom template from ~/.local/share/mcp-server-conceal/prompts/<name>.md
prompt_template = "simple"

[llm_cache]
enabled = true
database_path = "llm_cache.db"
max_text_length = 2000
